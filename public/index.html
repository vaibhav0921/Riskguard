<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RiskGuard — MT5 Risk Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    /* Prevent production builds from blocking scroll */
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* #root must grow with content, never fixed height */
    #root {
      min-height: 100%;
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>

</html>
